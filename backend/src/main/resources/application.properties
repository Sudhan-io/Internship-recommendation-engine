spring.application.name=backend

# ===============================
# DATABASE
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/internship_recommendation_engine}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Sudh@007}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SERVER
# ===============================
server.port=8081
server.error.include-message=always
# JWT
jwt.secret=${JWT_SECRET:internmatch_super_secret_key_change_this_in_production_2026}
jwt.expiration=${JWT_EXPIRATION:86400000}
# AI Service Configuration
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
# Multipart limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html